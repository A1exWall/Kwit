<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Kwit – Email Confirmed</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #e6f4fe, #ffffff);
      color: #102a43;
    }
    .card {
      background: white;
      padding: 32px 28px;
      border-radius: 16px;
      box-shadow: 0 18px 45px rgba(15, 52, 96, 0.12);
      max-width: 360px;
      text-align: center;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 24px;
    }
    p {
      margin: 0 0 20px;
      line-height: 1.5;
    }
    .cta {
      display: inline-block;
      padding: 10px 20px;
      border-radius: 999px;
      background: #007aff;
      color: white;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Email confirmed 🎉</h1>
    <p>Your email has been confirmed. You can now return to the Kwit app and sign in.</p>
    <a class="cta" href="#">Back to the app</a>
  </div>
</body>
</html>
